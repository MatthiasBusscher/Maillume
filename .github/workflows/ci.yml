name: CI

on:
  pull_request:

permissions: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.109.1

      - name: Start local database
        run: supabase start --ignore-health-check -x edge-runtime,gotrue,imgproxy,kong,logflare,mailpit,postgres-meta,postgrest,realtime,storage-api,studio,supavisor,vector

      - name: Database lifecycle tests
        run: |
          supabase test db --local supabase/tests
          supabase db lint --local --level warning

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Analysis tests
        run: npm run test:analysis

      - name: Security tests
        run: npm run test:security

      - name: Deployment contract tests
        run: npm run test:deployment

      - name: OAuth callback security tests
        run: node --test src/app/auth/callback/route.test.mjs

      - name: Integration behavior tests
        run: npm run test:integrations

      - name: Package integration artifacts
        run: npm run package:integrations

      - name: Load browser extension
        run: npm run test:extension

      - name: Build public demo configuration
        run: npm run build
        env:
          ANALYSIS_MODE: heuristic

      - name: Browser smoke tests
        run: npm run test:smoke

      - name: Stop local database
        if: always()
        run: supabase stop --no-backup

  secrets:
    name: Full-history secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out complete repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan Git history with Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
