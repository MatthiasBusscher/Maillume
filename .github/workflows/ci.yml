name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Analysis tests
        run: npm run test:analysis

      - name: Security tests
        run: npm run test:security

      - name: Integration behavior tests
        run: npm run test:integrations

      - name: Build public demo configuration
        run: npm run build
        env:
          ANALYSIS_MODE: heuristic

      - name: Browser smoke tests
        run: npm run test:smoke
